<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBT Roofing · Project Portfolio</title>
<link rel="icon" href="logo-blue.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{
  /* brand */
  --navy:#031b52; --navy-700:#0a2a6b; --navy-300:#3a5a9e; --navy-200:#8fa6d6; --navy-tint:#eef2f9;
  --red:#c8102e; --accent:#c8102e; --red-700:#9e1f17; --red-tint:#fbe9ec; --accent-soft:#fbe9ec;
  /* sidebar */
  --sidebar:#031b52; --sidebar2:#02123a; --side-txt:#9fb0d4; --side-lbl:#6b7da0;
  /* ink + neutrals */
  --ink:#0c1c3a; --ink2:#33415c; --muted:#5f6b85; --faint:#94a3b8;
  --bg:#f4f6fa; --panel:#ffffff; --line:#e3e7f0; --line2:#f0f2f7; --track:#eef1f6;
  /* status */
  --s-pre:#b8860b; --s-prog:#031b52; --s-post:#c8102e; --s-demo:#6b7280; --s-close:#1a7a4f;
  --success:#1a7a4f; --warn:#b8860b; --danger:#c8102e;
  /* radius */
  --r-sm:6px; --r-md:8px; --r-lg:10px; --r-pill:999px;
  /* elevation (navy-tinted) */
  --shadow-xs:0 1px 2px rgba(3,27,82,.06);
  --shadow-md:0 4px 12px rgba(3,27,82,.10);
  --shadow-lg:0 12px 32px rgba(3,27,82,.18), 0 4px 8px rgba(3,27,82,.06);
  /* type scale: 3 sizes, 2 weights */
  --fs-sm:12px; --fs-base:15px; --fs-lg:22px;
  --fw-normal:500; --fw-bold:700;
  /* type */
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-display:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:var(--fs-base);line-height:1.45;font-weight:var(--fw-normal);font-feature-settings:"tnum","cv05"}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c4ccdb;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#a9b4c8}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
svg{display:block}
.lucide{stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
*:focus-visible{outline:2px solid var(--navy);outline-offset:2px;border-radius:3px}

/* ---------------- Layout ---------------- */
.app{display:grid;grid-template-columns:212px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--sidebar);color:var(--side-txt);display:flex;flex-direction:column;padding:22px 14px;border-right:1px solid rgba(255,255,255,.08)}
.brand{display:flex;align-items:center;padding:8px 10px 24px}
.brand img{height:38px;width:auto;display:block}
.nav{display:flex;flex-direction:column;gap:2px}
.nav .lbl{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.08em;color:var(--side-lbl);font-weight:var(--fw-bold);padding:16px 12px 7px}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);color:var(--side-txt);text-decoration:none;font-weight:var(--fw-normal);font-size:var(--fs-base);cursor:pointer;transition:background .13s,color .13s,box-shadow .13s;position:relative}
.nav a svg{width:18px;height:18px;flex:none;color:var(--navy-200)}
.nav a:hover{background:rgba(255,255,255,.05);color:#dfe5f2}
.nav a:active{transform:scale(.98)}
.nav a.active{background:rgba(255,255,255,.09);color:#fff}
.nav a.active svg{color:#fff}
.nav a .badge{margin-left:auto;font-size:var(--fs-sm);font-weight:var(--fw-normal);padding:1px 8px;border-radius:var(--r-pill);background:rgba(255,255,255,.1);color:#cfd8ea;font-variant-numeric:tabular-nums}
.nav a.active .badge{background:rgba(255,255,255,.16);color:#fff}
.nav a .badge.alert{background:var(--red);color:#fff}
.sidefoot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.08)}
.sidefoot .row{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:var(--r-md);background:#0a2a6b;display:grid;place-items:center;color:#cdd8ee;font-weight:var(--fw-bold);font-size:var(--fs-base)}
.sidefoot .nm{font-size:var(--fs-base);color:#e3e9f5;font-weight:var(--fw-normal)}
.sidefoot .rl{font-size:var(--fs-sm);color:var(--side-lbl)}

.main{overflow-y:auto;height:100vh}
.topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:15px 32px;display:flex;align-items:center;gap:18px}
.topbar .ttl h2{font-size:var(--fs-base);font-weight:var(--fw-bold);letter-spacing:-.01em;line-height:1.2;color:var(--ink)}
.topbar .ttl p{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);margin-top:3px}
.search{margin-left:auto;position:relative}
.search input{width:290px;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;font-size:var(--fs-sm);font-weight:var(--fw-normal);font-family:inherit;color:var(--ink);outline:none;transition:border-color .13s,box-shadow .13s}
.search input::placeholder{color:var(--faint)}
.search input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(3,27,82,.12)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:var(--r-md);font-size:var(--fs-sm);font-weight:var(--fw-normal);cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink2);transition:.13s;font-family:inherit}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--navy-300);color:var(--navy)}
.btn:active{transform:scale(.97)}
.databadge{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:#8a6508;background:#fdf6e7;border:1px solid #f0e0b8;padding:6px 11px;border-radius:var(--r-pill);white-space:nowrap;cursor:help}
.databadge svg{width:14px;height:14px;color:var(--warn)}
.databadge.imported{color:#136a42;background:#e7f5ee;border-color:#bfe3cf}
.databadge.imported svg{color:var(--success)}
.asof{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);display:flex;align-items:center;gap:7px;white-space:nowrap}
.asof .dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px rgba(26,122,79,.16)}
.content{padding:24px 32px 64px}
.view{display:none}
.view.show{display:block;animation:viewin .26s cubic-bezier(.22,1,.36,1)}
@keyframes viewin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------------- Confidence strip ---------------- */
.confstrip{display:flex;align-items:center;gap:0;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-xs);padding:14px 4px;margin-bottom:20px}
.confstrip .ci{flex:1;padding:0 22px;border-right:1px solid var(--line2)}
.confstrip .ci:last-child{border-right:none}
.confstrip .cv{font-family:var(--font-display);font-size:var(--fs-lg);font-weight:var(--fw-normal);color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.confstrip .cl{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold);margin-top:5px}

/* ---------------- Cards ---------------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-xs)}
.card .hd{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card .hd h3{font-size:var(--fs-base);font-weight:var(--fw-bold);letter-spacing:-.01em;color:var(--ink)}
.card .hd .sub{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);margin-top:3px}
.card .bd{padding:20px}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px}
.kpis.even{grid-template-columns:repeat(4,1fr)}
.kpis.three{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-xs);position:relative}
.kpi .ic{display:none}
.kpi .lbl{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold)}
.kpi .val{font-family:var(--font-display);font-size:var(--fs-lg);font-weight:var(--fw-normal);letter-spacing:-.01em;margin-top:6px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.kpi .meta{font-size:var(--fs-sm);margin-top:10px;display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:var(--fw-normal)}
.kpi .chip{font-weight:var(--fw-normal);padding:2px 8px;border-radius:var(--r-sm);font-size:var(--fs-sm);font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:3px}
.chip.up{background:#e7f5ee;color:var(--success)}
.chip.down{background:var(--red-tint);color:var(--red-700)}
.chip.flat{background:var(--navy-tint);color:var(--navy)}

.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}
.grid-2e{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* ---------------- Stacked portfolio bar ---------------- */
.stackbar{display:flex;height:30px;border-radius:var(--r-sm);overflow:hidden;background:var(--track)}
.stackbar i{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:var(--fs-sm);font-weight:var(--fw-normal);font-variant-numeric:tabular-nums;min-width:0;transition:width .7s cubic-bezier(.16,1,.3,1)}
.stacklegend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px}
.stacklegend span{display:flex;align-items:center;gap:7px;font-size:var(--fs-sm);color:var(--ink2);font-weight:var(--fw-normal)}
.stacklegend b{margin-left:4px;color:var(--muted);font-weight:var(--fw-normal);font-variant-numeric:tabular-nums}
.stacklegend i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* ---------------- Status chip ---------------- */
.st{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);font-weight:var(--fw-normal);padding:3px 10px;border-radius:var(--r-pill);white-space:nowrap}
.st .d{width:7px;height:7px;border-radius:50%}
.st.pre{background:#fdf6e7;color:#8a6508}.st.pre .d{background:var(--s-pre)}
.st.prog{background:var(--navy-tint);color:var(--navy)}.st.prog .d{background:var(--s-prog)}
.st.post{background:var(--red-tint);color:var(--red-700)}.st.post .d{background:var(--s-post)}
.st.demo{background:#eef1f5;color:#475569}.st.demo .d{background:var(--s-demo)}
.st.subc{background:#e3f3f6;color:#0b5c70}.st.subc .d{background:#0e7490}
.st.close{background:#e7f5ee;color:#136a42}.st.close .d{background:var(--s-close)}

/* ---------------- Progress bar ---------------- */
.pbar{height:7px;background:var(--track);border-radius:var(--r-sm);overflow:hidden;min-width:90px;flex:1}
.pbar i{display:block;height:100%;border-radius:var(--r-sm);transition:width .7s cubic-bezier(.16,1,.3,1)}

/* ---------------- Table ---------------- */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:var(--fs-base)}
thead th{text-align:left;font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold);padding:0 14px 11px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
thead th.r{text-align:right}
thead th .sorti{display:inline-block;width:11px;height:11px;vertical-align:-2px;margin-left:2px;color:var(--navy-300)}
tbody td{padding:13px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody td.r{text-align:right}
tbody tr{cursor:pointer;transition:background .12s,box-shadow .12s}
tbody tr:hover{background:var(--navy-tint)}
tbody tr:last-child td{border-bottom:none}
tfoot tr.totalrow td{background:var(--navy-tint);color:var(--ink);font-weight:var(--fw-bold);font-size:var(--fs-sm);border-top:2px solid var(--navy-200);border-bottom:none;padding:12px 14px}
.pname{font-weight:var(--fw-normal);color:var(--ink);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pid{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal)}
.loc{font-size:var(--fs-sm);color:var(--muted)}
.mono-val{font-weight:var(--fw-normal);font-variant-numeric:tabular-nums}
.person{display:flex;align-items:center;gap:8px}
.person .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:#fff;flex:none}

/* ---------------- Filter pills ---------------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.pill{padding:7px 14px;border:1px solid var(--line);background:#fff;border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--muted);cursor:pointer;transition:.13s;display:inline-flex;gap:7px;align-items:center}
.pill:hover{border-color:var(--navy-300);color:var(--navy)}
.pill:active{transform:scale(.97)}
.pill.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pill .ct{font-size:var(--fs-sm);opacity:.7;font-variant-numeric:tabular-nums}
.filtgrp{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filtgrp .sep{width:1px;height:22px;background:var(--line);margin:0 4px}

/* ---------------- Legend ---------------- */
.legend{display:flex;gap:16px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal)}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* ---------------- Attention feed ---------------- */
.alist{display:flex;flex-direction:column}
.arow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line2);cursor:pointer;transition:opacity .12s}
.arow:last-child{border:none}
.arow:hover{opacity:.7}
.arow .ico{width:34px;height:34px;border-radius:var(--r-md);display:grid;place-items:center;flex:none;background:var(--red-tint);color:var(--red)}
.arow .ico.warn{background:#fdf6e7;color:var(--warn)}
.arow .ico svg{width:17px;height:17px}
.arow .t{font-weight:var(--fw-normal);font-size:var(--fs-base);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:215px;color:var(--ink)}
.arow .s{font-size:var(--fs-sm);color:var(--muted);margin-top:1px}
.arow .r{margin-left:auto;text-align:right;white-space:nowrap}
.arow .r .risk{font-weight:var(--fw-bold);color:var(--red);font-variant-numeric:tabular-nums;font-size:var(--fs-base)}
.arow .r .who{font-size:var(--fs-sm);color:var(--faint)}

/* ---------------- Map ---------------- */
#map{height:560px;border-radius:var(--r-lg);z-index:1}
.leaflet-popup-content-wrapper{border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:0;overflow:hidden}
.leaflet-popup-content{font-family:var(--font);margin:0;width:auto!important}
.mp{width:248px}
.mp-h{background:var(--navy);color:#fff;padding:11px 14px}
.mp-h .t{font-weight:var(--fw-bold);font-size:var(--fs-base);line-height:1.3}
.mp-h .p{font-size:var(--fs-sm);color:var(--navy-200);font-weight:var(--fw-bold);letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.mp-b{padding:11px 14px}
.mp-r{display:flex;gap:10px;font-size:var(--fs-sm);color:var(--ink);margin:7px 0;align-items:flex-start}
.mp-r .k{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);width:62px;flex:none}
.mp-r .v{font-weight:var(--fw-normal);color:var(--ink)}

/* ---------------- Kanban ---------------- */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:286px;gap:18px;overflow-x:auto;padding-bottom:14px;align-items:start}
.kcol{background:#eef1f6;border-radius:var(--r-lg);padding:12px}
.kcol .kh{display:flex;align-items:center;gap:8px;padding:4px 6px 4px}
.kcol .kh .n{margin-left:auto;background:#fff;color:var(--muted);font-size:var(--fs-sm);font-weight:var(--fw-normal);padding:1px 9px;border-radius:var(--r-pill);font-variant-numeric:tabular-nums}
.kcol .kv-tot{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);padding:7px 6px 12px;font-variant-numeric:tabular-nums}
.kcard{background:#fff;border-radius:var(--r-lg);padding:12px;margin-bottom:10px;box-shadow:var(--shadow-xs);cursor:pointer;border:1px solid var(--line);transition:transform .14s,box-shadow .14s,border-color .14s}
.kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kcard:active{transform:scale(.985)}
.kcard .kt{font-weight:var(--fw-normal);font-size:var(--fs-sm);line-height:1.3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--ink)}
.kcard .km{font-size:var(--fs-sm);color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:5px}
.kcard .km svg{width:13px;height:13px;color:var(--faint)}
.kcard .kv{font-family:var(--font-display);font-weight:var(--fw-bold);font-size:var(--fs-lg);margin-top:9px;color:var(--ink);font-variant-numeric:tabular-nums}
.kcard .ksys{font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--navy-300);background:var(--navy-tint);padding:2px 7px;border-radius:var(--r-sm);display:inline-block}
.kempty{display:flex;flex-direction:column;align-items:center;gap:8px;padding:30px 0;color:var(--faint);font-size:var(--fs-sm);text-align:center}
.kempty svg{width:26px;height:26px}

/* ---------------- Gantt ---------------- */
.gantt{overflow-x:auto;padding-bottom:6px}
.gt-head{display:grid;grid-template-columns:230px 1fr;border-bottom:1px solid var(--line)}
.gt-months{position:relative;height:28px}
.gt-month{position:absolute;font-size:var(--fs-sm);color:var(--faint);font-weight:var(--fw-normal);border-left:1px solid var(--line2);padding:6px 0 0 6px;height:170%;pointer-events:none}
.gt-row{display:grid;grid-template-columns:230px 1fr;align-items:center;border-bottom:1px solid var(--line2);min-height:40px}
.gt-row:hover{background:var(--navy-tint)}
.gt-lbl{padding:6px 14px 6px 0;overflow:hidden}
.gt-lbl .n{font-size:var(--fs-sm);font-weight:var(--fw-normal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.gt-lbl .m{font-size:var(--fs-sm);color:var(--faint);display:flex;align-items:center;gap:5px;margin-top:1px}
.gt-track{position:relative;height:40px}
.gt-bar{position:absolute;top:10px;height:20px;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transform-origin:left center;animation:gtin .5s cubic-bezier(.16,1,.3,1) both}
.gt-bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:var(--r-sm)}
.gt-bar .lab{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:var(--fs-sm);font-weight:var(--fw-normal);color:#fff;font-variant-numeric:tabular-nums;z-index:1}
@keyframes gtin{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.gt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:3;pointer-events:none}
.gt-today b{position:absolute;top:3px;left:5px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:#fff;background:var(--red);padding:1px 5px;border-radius:var(--r-sm);white-space:nowrap;letter-spacing:.03em}

/* ---------------- Bullet / bars ---------------- */
.bullet{margin:15px 0}
.bullet .bt{display:flex;justify-content:space-between;font-size:var(--fs-sm);margin-bottom:6px}
.bullet .bt .nm{font-weight:var(--fw-normal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%;color:var(--ink)}
.bullet .bt .vv{font-variant-numeric:tabular-nums;font-weight:var(--fw-normal);color:var(--ink)}
.bullet .bt .vv span{color:var(--muted);font-weight:var(--fw-normal)}
.bullet .track{position:relative;height:16px;background:var(--track);border-radius:var(--r-sm);overflow:visible}
.bullet .warnband{position:absolute;top:0;bottom:0;background:var(--red-tint);border-radius:0 var(--r-sm) var(--r-sm) 0}
.bullet .fill{position:absolute;top:0;left:0;height:100%;border-radius:var(--r-sm);transition:width .7s cubic-bezier(.16,1,.3,1)}
.bullet .target{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--navy);border-radius:1px}

.hbar{display:flex;align-items:center;gap:12px;margin:12px 0}
.hbar .hl{width:128px;font-size:var(--fs-sm);font-weight:var(--fw-normal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;color:var(--ink2)}
.hbar .ht{flex:1;height:22px;background:var(--track);border-radius:var(--r-sm);overflow:hidden}
.hbar .ht i{display:block;height:100%;background:var(--navy);border-radius:var(--r-sm);transition:width .7s cubic-bezier(.16,1,.3,1)}
.hbar .hv{font-size:var(--fs-sm);font-weight:var(--fw-normal);width:80px;text-align:right;flex:none;font-variant-numeric:tabular-nums;color:var(--ink)}

.muted{color:var(--muted)}
.dr-line .v.pos{color:var(--success)}
.dr-line .v.neg{color:var(--red)}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:48px;color:var(--faint);font-size:var(--fs-base)}
.empty svg{width:30px;height:30px}

/* ---------------- Drawer ---------------- */
.drawer-bg{position:fixed;inset:0;background:rgba(3,27,82,.34);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-bg.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--bg);z-index:50;transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);overflow-y:auto;box-shadow:var(--shadow-lg)}
.drawer.open{transform:none}
.dr-head{padding:22px 26px;background:var(--navy);color:#fff;position:relative}
.dr-head .logo{position:absolute;top:20px;right:60px;height:18px;opacity:.6}
.dr-head .pid{color:var(--navy-200);font-size:var(--fs-sm);font-weight:var(--fw-bold);letter-spacing:.04em;text-transform:uppercase}
.dr-head h2{font-size:var(--fs-base);font-weight:var(--fw-bold);margin:7px 0 11px;line-height:1.25;max-width:90%}
.dr-head .loc{color:var(--navy-200);font-size:var(--fs-base);display:flex;align-items:center;gap:6px}
.dr-head .loc svg{width:14px;height:14px}
.dr-close{position:absolute;top:18px;right:22px;width:32px;height:32px;border-radius:var(--r-md);background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;display:grid;place-items:center;transition:.13s}
.dr-close svg{width:17px;height:17px}
.dr-close:hover{background:rgba(255,255,255,.2)}
.dr-close:active{transform:scale(.95)}
.dr-body{padding:22px 26px 50px}
.dr-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.dr-stat{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:14px}
.dr-stat .l{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-bold);text-transform:uppercase;letter-spacing:.05em}
.dr-stat .v{font-size:var(--fs-base);font-weight:var(--fw-bold);margin-top:5px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.2}
.dr-sec{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px}
.dr-sec h4{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold);margin-bottom:12px}
.dr-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2);font-size:var(--fs-base)}
.dr-line:last-child{border:none}
.dr-line .k{color:var(--muted)}
.dr-line .v{font-weight:var(--fw-normal);text-align:right;color:var(--ink)}
.dr-anim>*{animation:drin .4s cubic-bezier(.22,1,.36,1) both}
@keyframes drin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.bigbar{height:11px;background:var(--track);border-radius:var(--r-sm);overflow:hidden;margin:8px 0}
.bigbar i{display:block;height:100%;border-radius:var(--r-sm);transition:width .7s cubic-bezier(.16,1,.3,1)}

/* ---------------- Cost Control (job cost report) ---------------- */
.ccbar{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.csel{position:relative}
.csel-btn{display:flex;align-items:center;gap:10px;width:100%;min-width:340px;padding:10px 14px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;font-family:inherit;font-size:var(--fs-base);font-weight:var(--fw-normal);color:var(--ink);cursor:pointer;text-align:left;outline:none;transition:border-color .13s,box-shadow .13s}
.csel-btn span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csel-btn svg{width:16px;height:16px;color:var(--muted);flex:none;transition:transform .18s}
.csel.open .csel-btn{border-color:var(--navy);box-shadow:0 0 0 3px rgba(3,27,82,.12)}
.csel.open .csel-btn svg{transform:rotate(180deg)}
.csel-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:60;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-lg);padding:6px;max-height:340px;overflow-y:auto;display:none}
.csel.open .csel-panel{display:block}
.csel-opt{padding:9px 12px;border-radius:var(--r-sm);font-size:var(--fs-base);font-weight:var(--fw-normal);color:var(--ink2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
.csel-opt:hover{background:var(--navy-tint)}
.csel-opt.on{background:var(--navy-tint);color:var(--navy);font-weight:var(--fw-bold)}
/* compact filter bar */
.fbar{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.fsel{position:relative}
.fsel-lbl{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold);margin-bottom:4px}
.fsel-btn{display:flex;align-items:center;gap:8px;min-width:150px;max-width:220px;padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;font-family:inherit;font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--ink);cursor:pointer;text-align:left;outline:none;transition:border-color .13s,box-shadow .13s}
.fsel-btn span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsel-btn svg{width:15px;height:15px;color:var(--muted);flex:none;transition:transform .18s}
.fsel.open .fsel-btn{border-color:var(--navy);box-shadow:0 0 0 3px rgba(3,27,82,.12)}
.fsel.open .fsel-btn svg{transform:rotate(180deg)}
.fsel .csel-panel{min-width:180px}
.fsel.open .csel-panel{display:block}
.fclear{align-self:flex-end;padding:8px 12px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;font-family:inherit;font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--muted);cursor:pointer;transition:.13s}
.fclear:hover{color:var(--red);border-color:var(--red)}
/* weather grid */
.wxtbl{min-width:920px}
.wxtbl th.wx-dh{text-align:center;font-size:var(--fs-sm);line-height:1.25;white-space:nowrap}
.wxtbl th.wx-dh span{font-size:var(--fs-sm);color:var(--faint);font-weight:var(--fw-normal)}
.wxtbl td.wx-cell{padding:6px 3px;text-align:center}
.wx-day{width:30px;height:26px;border-radius:var(--r-sm);display:grid;place-items:center;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:#fff;margin:0 auto;font-variant-numeric:tabular-nums;cursor:default}
.wx-ok{background:#1a7a4f}
.wx-warn{background:#d99a00}
.wx-bad{background:#c8102e}
.ccbar .ccmeta{font-size:var(--fs-sm);color:var(--muted);font-weight:var(--fw-normal);display:flex;gap:14px;align-items:center}
.ccbar .ccmeta b{color:var(--ink)}
.ccwrap{overflow-x:auto}
.costtbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm);min-width:1180px}
.costtbl th{background:#fff;color:var(--muted);font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.04em;font-weight:var(--fw-bold);padding:8px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line);position:sticky;top:0;cursor:default}
.costtbl th.l{text-align:left}
.costtbl thead tr.grp th{background:var(--navy-tint);color:var(--navy);font-size:var(--fs-sm);letter-spacing:.08em;padding:5px 9px;text-align:center;border-bottom:1px solid var(--line)}
.costtbl td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--line2);white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--ink2)}
.costtbl td.l{text-align:left}
.costtbl tr.divrow td{background:var(--navy-tint);font-weight:var(--fw-bold);color:var(--navy);text-transform:uppercase;font-size:var(--fs-sm);letter-spacing:.05em;padding:6px 10px}
.costtbl tr.coderow:hover{background:#fafbfc}
.costtbl .ccode{font-family:ui-monospace,Menlo,monospace;font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--navy)}
.costtbl .cdesc{font-weight:var(--fw-normal);color:var(--ink);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.costtbl tr.subrow td{border-top:1px solid var(--line);border-bottom:2px solid var(--line);font-weight:var(--fw-bold);color:var(--ink);background:#fbfcfe;font-size:var(--fs-sm)}
.costtbl tr.totalrow td{background:var(--navy-tint);color:var(--ink);font-weight:var(--fw-bold);font-size:var(--fs-sm);border-top:2px solid var(--navy-200)}
.costtbl tr.totalrow td.l{color:var(--ink)}
.costtbl .gl.pos{color:var(--success);font-weight:var(--fw-normal)}
.costtbl .gl.neg{color:var(--red);font-weight:var(--fw-normal)}
.costtbl tr.totalrow .gl.pos{color:var(--success)}.costtbl tr.totalrow .gl.neg{color:var(--red)}
.catb{display:inline-block;font-size:var(--fs-sm);font-weight:var(--fw-bold);padding:1px 6px;border-radius:var(--r-sm);letter-spacing:.02em}
.catb.L{background:#eaf0fe;color:#1d4ed8}
.catb.M{background:#fdf6e7;color:#8a6508}
.catb.E{background:#eef1f5;color:#475569}
.catb.S{background:var(--red-tint);color:var(--red-700)}
.catb.B{background:#f3eafe;color:#7c3aed}
.catb.O{background:#e7f5ee;color:#136a42}
.vendrow td{padding:3px 9px 7px 30px!important;text-align:left!important;background:#fff;border-bottom:1px solid var(--line2)}
.vendln{display:inline-flex;align-items:center;gap:8px;font-size:var(--fs-sm);color:var(--muted)}
.vendln svg{width:12px;height:12px;color:var(--navy-300)}
.vendln b{color:var(--ink2);font-weight:var(--fw-normal)}
.vendln .price{font-variant-numeric:tabular-nums;font-weight:var(--fw-normal);color:var(--navy)}
.bo{display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-sm);font-weight:var(--fw-bold);padding:2px 8px;border-radius:var(--r-pill);text-transform:uppercase;letter-spacing:.03em}
.bo .d{width:6px;height:6px;border-radius:50%}
.bo.bought{background:#e7f5ee;color:#136a42}.bo.bought .d{background:var(--s-close)}
.bo.pending{background:#fdf6e7;color:#8a6508}.bo.pending .d{background:var(--s-pre)}
.bo.open{background:var(--red-tint);color:var(--red-700)}.bo.open .d{background:var(--red)}

/* ---------------- Export menu ---------------- */
.expmenu{position:fixed;z-index:80;min-width:238px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-lg);padding:6px;animation:viewin .14s}
.expmenu-lbl{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold);padding:7px 12px 6px}
.expmenu button{display:block;width:100%;text-align:left;padding:9px 12px;border:none;background:none;border-radius:var(--r-sm);font-family:inherit;font-size:var(--fs-base);font-weight:var(--fw-normal);color:var(--ink2);cursor:pointer}
.expmenu button:hover{background:var(--navy-tint);color:var(--navy)}
.expmenu-sep{height:1px;background:var(--line2);margin:5px 6px}
.expmenu-fmt{display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:var(--fw-bold)}
.expfmt{margin-left:0;padding:3px 10px;border:1px solid var(--line);border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:var(--fw-normal);color:var(--ink2);cursor:pointer;text-transform:none;letter-spacing:0}
.expfmt:first-of-type{margin-left:auto}
.expfmt.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ---------------- Import modal ---------------- */
#importModal{position:fixed;inset:0;z-index:60;display:none}
#importModal.open{display:block}
#importModal .im-bg{position:absolute;inset:0;background:rgba(3,27,82,.34);animation:viewin .2s}
#importModal .im-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;max-width:94vw;background:var(--bg);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:imin .26s cubic-bezier(.22,1,.36,1)}
@keyframes imin{from{opacity:0;transform:translate(-50%,-46%)}to{opacity:1;transform:translate(-50%,-50%)}}
.im-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:22px 24px 16px;background:#fff;border-bottom:1px solid var(--line)}
.im-head h3{font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--ink)}
.im-head p{font-size:var(--fs-sm);color:var(--muted);margin-top:3px;max-width:400px}
.im-drop{margin:20px 24px 4px;border:1.5px dashed #c3cde0;border-radius:var(--r-lg);background:#fff;padding:30px 20px;text-align:center;cursor:pointer;transition:.15s;color:var(--navy)}
.im-drop:hover,.im-drop.over{border-color:var(--navy);background:var(--navy-tint)}
.im-drop svg{margin:0 auto 10px;color:var(--navy-300)}
.im-dt{font-weight:var(--fw-normal);font-size:var(--fs-base);color:var(--ink)}
.im-ds{font-size:var(--fs-sm);color:var(--muted);margin-top:3px}
#imResult{padding:4px 24px 0}
.im-ok,.im-err{border-radius:var(--r-md);padding:12px 14px;font-size:var(--fs-sm);margin-top:14px;display:flex;flex-direction:column;gap:6px}
.im-ok{background:#e7f5ee;color:#136a42}.im-ok svg{color:var(--success);display:inline;vertical-align:-3px;margin-right:4px}
.im-err{background:var(--red-tint);color:var(--red-700)}.im-err svg{color:var(--red);display:inline;vertical-align:-3px;margin-right:4px}
.im-cols{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.im-cols span{background:rgba(19,106,66,.12);padding:1px 8px;border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:var(--fw-normal)}
.im-sub{font-size:var(--fs-sm);opacity:.85;font-weight:var(--fw-normal)}
.im-foot{display:flex;align-items:center;gap:10px;padding:18px 24px}
.im-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.im-primary:hover:not(:disabled){background:var(--navy-700);color:#fff;border-color:var(--navy-700)}
.im-primary:disabled{opacity:.4;cursor:not-allowed}
.im-note{display:flex;align-items:flex-start;gap:7px;padding:13px 24px;background:#fff;border-top:1px solid var(--line);font-size:var(--fs-sm);color:var(--muted);line-height:1.5}
.im-note svg{color:var(--navy-300);flex:none;margin-top:1px}
.im-note code{background:var(--navy-tint);padding:1px 5px;border-radius:4px;font-size:var(--fs-sm);color:var(--navy)}

/* ---------------- Print ---------------- */
.printhead{display:none}
@media print{
  .sidebar,.topbar,.drawer,.drawer-bg{display:none!important}
  .app{display:block;height:auto}
  .main{overflow:visible;height:auto}
  .view{display:none!important}
  .view.show{display:block!important;animation:none}
  .content{padding:0}
  .printhead{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px;margin-bottom:20px;border-bottom:2px solid var(--navy)}
  .printhead img{height:40px}
  .printhead .pt{font-family:var(--font-display);font-size:var(--fs-lg);font-weight:var(--fw-normal);color:var(--navy)}
  .printhead .pd{font-size:var(--fs-sm);color:var(--muted)}
  .card,.kpi{box-shadow:none;break-inside:avoid}
  .grid2,.grid-2e,.grid3,.kpis{grid-template-columns:1fr!important}
}

/* ---------------- Responsive ---------------- */
.hamburger{display:none;align-items:center;justify-content:center;width:38px;height:38px;flex:none;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;color:var(--ink);cursor:pointer;padding:0}
.hamburger svg{width:20px;height:20px}
.sidebar-bg{display:none;position:fixed;inset:0;background:rgba(3,27,82,.4);z-index:40}
.sidebar-bg.open{display:block}

/* large laptops: 3-up where we had 4 */
@media(max-width:1300px){.kpis,.kpis.even{grid-template-columns:repeat(3,1fr)}}

/* tablets */
@media(max-width:1150px){
  .app{grid-template-columns:188px 1fr}
  .kpis,.kpis.even,.kpis.three,.grid3{grid-template-columns:repeat(2,1fr)}
  .grid2,.grid-2e{grid-template-columns:1fr}
  .content{padding:20px 22px 56px}
  .topbar{padding:14px 22px}
  .search input{width:200px}
}

/* phones & small tablets: off-canvas sidebar */
@media(max-width:860px){
  .app{display:block;height:auto;overflow:visible}
  .hamburger{display:inline-flex}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:248px;z-index:50;transform:translateX(-100%);transition:transform .3s cubic-bezier(.32,.72,0,1);will-change:transform}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .main{height:auto;min-height:100vh}
  .topbar{padding:11px 16px;gap:10px;flex-wrap:wrap}
  .topbar .ttl{flex:1 1 auto;min-width:0}
  .topbar .ttl h2{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .ttl p{display:none}
  .search{order:5;flex:1 1 100%}
  .search input{width:100%}
  .databadge{display:none}
  .content{padding:16px 14px 48px}
  .kpis,.kpis.even,.kpis.three,.grid3,.grid2,.grid-2e{grid-template-columns:1fr}
  .drawer{width:100vw;max-width:100vw}
  .dr-stats{grid-template-columns:1fr 1fr}
  #map{min-height:60vh}
  .fbar{gap:8px}
  .fsel,.fsel-btn{min-width:0}
  .fsel-btn{max-width:46vw}
}

/* very small phones: trim button labels to icons */
@media(max-width:480px){
  .btn{padding:9px 11px}
  .btn svg{margin:0}
  #importBtn span,#exportBtn span{display:none}
  .kpi{padding:16px}
  .card .bd{padding:14px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><img src="logo-white.svg" alt="RBT Roofing — Installing Excellence Nationwide"></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidefoot">
      <div class="row">
        <div class="avatar">TU</div>
        <div><div class="nm">Test User</div><div class="rl">RBT Roofing</div></div>
      </div>
    </div>
  </aside>
  <div class="sidebar-bg" id="sidebarBg"></div>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle menu"><svg class="lucide" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="ttl"><h2 id="vtitle">Current Projects</h2><p id="vsub">Active jobs — what's behind schedule and where money is at risk</p></div>
      <div class="search">
        <svg class="lucide" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" placeholder="Search projects, cities, PMs…">
      </div>
      <button class="btn" id="importBtn"><svg class="lucide" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>Import</button>
      <button class="btn" id="exportBtn"><svg class="lucide" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>Export</button>
      <div class="databadge" id="dataBadge" title="Dollar amounts, % complete, dates, crew sizes, cost codes and buyout figures are illustrative sample data. Real fields from your records: status, location, roof system, project manager, supervisor and subcontractor. Use Import to load your actual figures.">
        <svg class="lucide" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        <span id="dataBadgeText">Sample figures</span>
      </div>
